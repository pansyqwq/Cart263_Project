<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wowaka: Audio Visual</title>
    <link rel="stylesheet" href="styles.css" />

</head>

<body>

    <header class="top-bar">
        <div class="brand">
            <button id="playPause">▶</button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
        <select id="songSelect">
            <option value="sounds/rolling_girl.mp3">Rolling Girl</option>
            <option value="sounds/zureteiku.mp3">Zureteiku</option>
        </select>
        </div>

        <audio id="audio"></audio>

        <button class="about-btn">About This Project</button>
    </header>

    <main>
        <div class="a-visuals"></div>

        <div class="text">
        <section class="song-info">
            <h2>UNKNOWN MOTHER GOOSE <span id="featuring">feat. 初音ミク</span></h2>
        </section>

        <h1 class="artist">WOWAKA</h1>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="audio.js"></script>
</body>

</html>
