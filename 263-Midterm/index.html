        <div class="buttons">
        <button id="statement">Artist Statement</button>

        <div class="about-popup">
            <div class="about-content">
                <button class="close-popup">✕</button>
                <p>
                    This project acts as an audio-visual tribute to the late Wowaka, who went on to inspire millions with his music.
                </p>
                <p id="date">1987-2019</p>
            </div>
        </div>
    </header>
