<!DOCTYPE html>
<html>

<head>
    <title>TEST SOUND JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
         <script src="js/visualsAndAnalysis.js"></script>
      <script src="js/note.js"></script>

    <script src="js/webaudio.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;

        canvas {
            background: black;

            left: 0%; */
            width: 1000px;
            height: 500px;
        }

        .buttons {

            margin-left: 15px;

            border-style: solid;
            padding:5px;
            margin-bottom:5px;

        .buttons:hover {

            padding:5px;

            margin-left: 15px;
            margin-bottom:5px;
        }

        option{

            padding:0;

    <h1> TESTING SOUNDS AND PATTERNS</h1>

    <p id="message"> state of audio </p>
  
    <div class="wrapper">
           <div class="buttons" id="note-detect"> PLAY NOTE </div>
           <input id = "freq" type = "number" min="0" max ="4000" value="500" />
        <div class="buttons" id="start"> START</div>
        <div class="buttons" id="stop"> STOP</div>
        <select name="sound_dropdown" id="sound_dropdown">
            <option value="select">SELECT</option>

            <option value = "soulprodmusic-nightfall-future-bass-music-228100.mp3">slow</option>
        </select>
        
    </div>
